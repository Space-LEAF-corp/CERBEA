apiVersion: apps/v1
kind: Deployment
metadata:
  name: ber-core
  namespace: cerbea
  labels:
    app: ber-core
    module: reactor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ber-core
  template:
    metadata:
      labels:
        app: ber-core
        module: reactor
    spec:
      containers:
      - name: ber-core
        image: cerbea/ber-core:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: metrics
        env:
        - name: BER_CONFINEMENT_LEVEL
          value: "8"
        - name: LOG_LEVEL
          value: "debug"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ber-core-service
  namespace: cerbea
  labels:
    app: ber-core
spec:
  selector:
    app: ber-core
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
    name: metrics
  type: ClusterIP
